name: Feature request
description: Suggest an enhancement or new capability for UniSSH.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. UniSSH is honest, in-progress software — please check the
        [Roadmap](https://github.com/goduni/unissh#roadmap) and
        [Project status](https://github.com/goduni/unissh#project-status) first; some of
        what you want may already be planned or in flight.

        > [!NOTE]
        > This is for features and enhancements. Bugs go to the bug-report form, and
        > **security issues go privately** to uni@goduni.me (see
        > [`SECURITY.md`](https://github.com/goduni/unissh/blob/main/SECURITY.md)).

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What can't you do today, or what's painful? Describe the need, not just the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Describe the behavior, API, or UI you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds you're using today, or how similar tools solve this.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the monorepo would this touch? Pick the closest one.
      options:
        - rust-core (crypto / keychain / storage / vault / ssh-agent / ssh-transport / ffi / cli / sync)
        - server (self-hosted axum server)
        - server-ui (web admin panel)
        - client (Tauri desktop / mobile)
        - website / docs
        - deploy / self-host (Caddy / Docker Compose)
        - cross-cutting / not sure
    validations:
      required: true

  - type: checkboxes
    id: invariants
    attributes:
      label: Contribution invariants
      description: UniSSH has two non-negotiable invariants (see [`CONTRIBUTING.md`](https://github.com/goduni/unissh/blob/main/CONTRIBUTING.md#critical-invariants)). Please confirm your idea is compatible with them.
      options:
        - label: This does **not** require duplicating core logic — crypto, blob/wire formats, storage, SSH, and the agent stay only in `rust-core`; other components call into it.
          required: true
        - label: This does **not** require routing plaintext private keys across the core↔UI/FFI boundary (private key material never leaves the core's in-memory agent).
          required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, links, prior art, or willingness to help implement it.
    validations:
      required: false
