name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly — surfaces new advisories via cargo-deny

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Toolchain (channel 1.94 + rustfmt/clippy) comes from rust-toolchain.toml.
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps (OpenSSL + C toolchain for bundled-sqlcipher)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev clang
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Logs must carry metadata only — fail if a log/print call interpolates a
      # secret-bearing value (see SECURITY.md "Logging and redaction").
      - name: Log redaction guard
        run: python3 scripts/check-log-redaction.py

  test:
    name: test (linux · root container · sshd)
    runs-on: ubuntu-latest
    # The sshd-backed integration tests are designed to run as root in an
    # isolated container (they log in as `root` against a self-spawned sshd).
    # The container also gives us a privileged, reproducible env for the full
    # `cargo test --workspace` (core crates + unissh-server).
    container: rust:bookworm
    steps:
      - uses: actions/checkout@v7
      - name: Install sshd + OpenSSL headers + C toolchain (bundled-sqlcipher)
        run: |
          apt-get update
          apt-get install -y \
            openssh-server openssh-client \
            pkg-config libssl-dev clang
      - uses: Swatinem/rust-cache@v2
      # rust:bookworm ships a recent stable toolchain; rust-toolchain.toml (1.94)
      # is honored by cargo via rustup inside the image.
      - run: cargo test --workspace

  deny:
    name: cargo-deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Root workspace (core crates + unissh-server). Reads deny.toml from root.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
      # The shipped desktop/mobile client is its OWN workspace (excluded from the
      # root), so the root gate above never sees its lockfile — gate it too, since
      # it is the binary users install. advisories+sources only (default policy).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: client/src-tauri/Cargo.toml
          command: check advisories sources
      # The admin-panel wasm crypto (keyset unlock / challenge signing / registration)
      # is also a standalone workspace and runs in users' browsers — gate it too.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: server-ui/crypto-wasm/Cargo.toml
          command: check advisories sources
