name: Publish container images (GHCR)

# Builds and pushes BOTH self-host container images to GHCR so operators can
#   docker compose -f compose.prod.yml up -d
# against prebuilt images instead of cold-compiling Rust + wasm on their box.
#
#   server image  -> ghcr.io/goduni/unissh-server  (server/Dockerfile)
#   caddy/SPA img -> ghcr.io/goduni/unissh-caddy    (deploy/Caddy.Dockerfile)
#
# UNSIGNED BY DESIGN (privacy): like the desktop releases, these images carry NO
# developer code-signing identity — no Apple/Authenticode/Docker Content Trust
# key, nothing tied to a legal person. The trust story is provenance, not a cert:
# each pushed image gets a SLSA build-provenance attestation (the
# actions/attest-build-provenance steps below), bound via GitHub OIDC to this
# public repo + workflow + commit and pushed to the registry. Verify a pulled
# image without trusting the maintainer:
#   gh attestation verify oci://ghcr.io/goduni/unissh-server:main --repo goduni/unissh
#
# IDENTITY-FREE AUTH: the only credential used is the built-in GITHUB_TOKEN
# (logging in as github.actor, the Actions bot) — no personal PAT, no registry
# password, no extra secret of any kind.
#
# BUILD CONTEXT IS THE REPO ROOT (".") FOR BOTH IMAGES — this is load-bearing
# (see compose.yml): server/Dockerfile COPYs rust-core/ + server/, and
# deploy/Caddy.Dockerfile builds crypto-wasm from ../../rust-core/crates/crypto
# plus the Vite SPA. Building from each Dockerfile's own dir would break the
# path deps.

on:
  push:
    branches: [main] # keep :main / :latest fresh
    tags: ["v*"] # versioned image tags for releases
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # OIDC for build provenance
  attestations: write # write the attestation

jobs:
  publish:
    name: build & push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # server: distroless Rust binary. COPYs rust-core/ + server/.
          - image: unissh-server
            dockerfile: server/Dockerfile
          # caddy/SPA: builds crypto-wasm (path-dep ../../rust-core/crates/crypto)
          # + the Vite SPA, served by caddy:2.
          - image: unissh-caddy
            dockerfile: deploy/Caddy.Dockerfile

    steps:
      - uses: actions/checkout@v7

      # Multi-arch: emulate arm64 on the amd64 runner via QEMU, then drive both
      # platforms through a single buildx builder.
      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Identity-free login: github.actor (the Actions bot) + GITHUB_TOKEN.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels:
      #   * push to main      -> 'main' (branch ref) + 'latest' (default branch)
      #   * push of a v* tag  -> full semver (e.g. 1.2.3) + 'major.minor' (1.2)
      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/goduni/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          # CRITICAL: context is the repo root for BOTH images (see header /
          # compose.yml) — the Dockerfiles COPY across rust-core/, server/ and
          # server-ui/, which only resolve from a single repo-root context.
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # SLSA build provenance for the image we just pushed — the compensating
      # control for unsigned-by-design images (consistent with the desktop
      # release-integrity job). Bound via GitHub OIDC, no personal key, and
      # pushed alongside the image in the registry.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/goduni/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
